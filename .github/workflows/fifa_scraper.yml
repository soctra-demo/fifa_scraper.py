name: FIFA Teams Price Scraper

on:
  schedule:
    - cron: '0 * * * *'   # Runs every hour, every day
  workflow_dispatch:        # Lets you trigger it manually for testing

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install supabase requests

      - name: Run FIFA scraper
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
          YOUTUBE_API_KEY:   ${{ secrets.YOUTUBE_API_KEY }}
        run: python fifa_scraper.py
